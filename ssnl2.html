<!DOCTYPE html>
<html>
    <head>
        <title>Mouse over effect</title>
    </head>
    <body>
        <h2>Mouse over effect</h2>
        <img src="img1.jpg" onmouseover="this.src='img2.jpg'" 
        onmouseout="this.src='img1.jpg'"
        width="300"
        height="300">
    </body>
</html>
